services:

  # ── PHP / Symfony ────────────────────────────────────────────────
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbitview_php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://orbitview:secret@db:5432/orbitview?serverVersion=16&charset=utf8"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - orbitview

  # ── Nginx ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: orbitview_nginx
    restart: unless-stopped
    ports:
      - "8080:80"      # API  → http://localhost:8080
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - php
    networks:
      - orbitview

  # ── PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: orbitview_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbitview
      POSTGRES_USER: orbitview
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitview"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - orbitview

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orbitview_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - orbitview

volumes:
  pg_data:
  redis_data:

networks:
  orbitview:
    driver: bridge
